<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Application Form</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container" >
        <div class="apply_box" >

            <h1>Job Application <span class="title_small">(web)</span></h1>

            <form action="">
                <div class="form_container">
                    <div class="form_control">
                        <label for="first_name">First Name</label>
                        <input 
                        id="first_name" 
                        name="first_name"
                        placeholder="enter first name....."
                        >
                    </div>
                
                    <div class="form_control">
                        <label for="last_name">Last Name</label>
                        <input
                         id="last_name" 
                        name="last_name"
                        placeholder="enter last name...."
                        >
                    </div>
                
                    <div class="form_control">
                        <label for="email">Email</label>
                        <input 
                        type="email"
                        id="email" 
                        name="Email"
                        placeholder="enter email...."
                        >
                    </div>
                    <div class="form_control">
                        <label for="job_role">Job Role</label>
                        <select name="" id="">
                            <option value="">Select Job Role</option>
                            <option value="frontend">Frontend Developer</option>
                            <option value="backend">Backend Developer</option>
                            <option value="full_stack">Fullstack Developer</option>
                            <option value="ui_ux">UI UX Designer</option>
                        </select>
                    </div>
                    <div class="form_control">
                        <label for="address">Address</label>
                       <textarea name="address" id="address" rows="4" cols="50" placeholder="Enter your Address"></textarea>
                    </div>
                    <div class="form_control">
                        <label for="city">City</label>
                       <input type="text" name="city" id="city" placeholder="enter your city">
                    </div>
                    <div class="form_control">
                        <label for="date">Pincode</label>
                       <input type="number" name="pincode" id="pincode" placeholder="enter your pincode">
                    </div>
                    <div class="form_control">
                        <label for="date">Date</label>
                       <input value="2022-01-05" type="date" name="date" id="date" placeholder="enter your dob">
                    </div>
                
                    <div class="form_control">
                        <label for="upload">Upload your CV</label>
                       <input type="file" name="upload" id="upload" placeholder="enter your file">
                    </div>
                </div>
                <div class="button_container">
                    <button type="submit">Apply Now</button>
                </div>
            </form>

        </div>
    </div>
  </body>
</html>
