<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StopWatch</title>
    <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRAHOm6WL7LyBoalXzjY2nIrkie40cK-80wYw&s" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/403ebc91f3.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="stopWatch">
        <h1 id="displayTime">00:00:00</h1>
        <div class="buttons">
            <img src="images/stop.png" alt="stop" onclick="watchStop()">
          
            <img src="images/start.png" alt="play" onclick="watchStart()">
            <img src="images/reset.png" alt="reset" onclick="watchReset()">
        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
